name: mmpy
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python=3.11 # likely required
  - pip
  - cuda-version=12.* # likely required
  - cupy==13.6.0
  - tensorflow==2.19.1
  - keras==3.14.1
  - numpy<2 # required; hidden requirement of hdfstorage
  - scipy==1.16.3
  - matplotlib==3.10.9
  - h5py==3.16.0
  - hdf5storage==0.1.19
  - scikit-learn==1.8.0
  - scikit-image==0.26.0
  - umap-learn==0.5.12
  - moviepy==1.0.3 # likely required
  - imageio==2.37.0
  - pip:
    - easydict==1.13
    - -e .
